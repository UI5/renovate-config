version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 2
  commit-message:
    prefix: "ci(github-actions)"
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: "daily"
  versioning-strategy: increase
  cooldown:
    default-days: 2
  commit-message:
    prefix: "deps"
    prefix-development: "build(deps-dev)"
